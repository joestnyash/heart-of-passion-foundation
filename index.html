body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb)}

.hero h1{font-size:42px;font-weight:900}
.section{background:#fff;margin:20px;padding:20px;border-radius:15px;border:2px solid #ddd}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}

.supported{background:green}

.progress-bar{height:8px;background:green;border-radius:10px}
button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:10px;font-weight:bold;cursor:pointer}
.floating{position:fixed;bottom:20px;right:20px;background:red;color:#fff;padding:15px;border-radius:50px;text-decoration:none;font-weight:bold}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:320px}
.gallery img{width:100%;border-radius:10px;cursor:pointer;transition:0.3s}
.gallery img:hover{transform:scale(1.05)}

function loadGallery(filter='all'){
let grid=document.getElementById("galleryGrid");
let data=filter==='all'?galleryImages:galleryImages.filter(i=>i.cat===filter);

grid.innerHTML=data.map(i=>`
<div>
<img src='${i.src}' onclick='openImage(this)'>
<p style='text-align:center;font-size:13px;'>${i.cap}</p>
</div>
`).join('');
}

function filterGallery(cat){loadGallery(cat)}

// slideshow auto
let slideIndex=0;
setInterval(()=>{
let imgs=document.querySelectorAll('#galleryGrid img');
if(imgs.length>0){
slideIndex=(slideIndex+1)%imgs.length;
imgs[slideIndex].click();
}
},8000);
