<!DOCTYPE html><html>
<head>
<title>Heart of Passion Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet"><style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb)}
.nav{background:#000;padding:15px;text-align:center;position:sticky;top:0}
.nav a{color:#fff;margin:15px;text-decoration:none;font-weight:bold}
.hero{padding:80px 20px;text-align:center;color:#fff;background:linear-gradient(135deg,#ff0000,#ff8c00,#1e90ff,#6a11cb)}
.hero img{width:420px;max-width:95%;margin-bottom:25px;filter:drop-shadow(0 12px 30px rgba(0,0,0,0.7))}
.hero h1{font-size:42px;font-weight:900}
.section{background:#fff;margin:20px;padding:20px;border-radius:15px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.card{background:#fff;padding:15px;border-radius:12px;border:2px solid #ccc}
.gallery img{width:100%;border-radius:10px;cursor:pointer;transition:0.3s}
.gallery img:hover{transform:scale(1.05)}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:none;justify-content:center;align-items:center}
.modal img{max-width:90%;max-height:90%}
.close{position:absolute;top:20px;right:30px;color:#fff;font-size:30px;cursor:pointer}
.floating{position:fixed;bottom:20px;right:20px;background:red;color:#fff;padding:15px;border-radius:50px}
</style></head><body><div class="nav">
<a href="#home">Home</a>
<a href="#children">Children</a>
<a href="#gallery">Gallery</a>
</div><div id="home" class="hero">
<img src="https://i.postimg.cc/7Z95tJtN/file-000000001a8871fdaf1d6e48910c57af.png">
<h1>HEART OF PASSION FOUNDATION</h1>
<p><b>Bonded in Love ♥️, Humanity, and By God</b></p>
</div><div id="children" class="section">
<h2>👶 Sponsor a Child</h2>
<div class="grid" id="childGrid"></div>
</div><!-- GALLERY --><div id="gallery" class="section">
<h2>📸 Gallery</h2><h3>Children Playing</h3>
<div class="grid gallery">
<img src="https://i.postimg.cc/MnvWLT3H/FB-IMG-1766220999253.jpg" onclick="openImage(this)">
<img src="https://i.postimg.cc/JsG1FnY3/FB-IMG-1766221003643.jpg" onclick="openImage(this)">
</div><h3>Study & Bible</h3>
<div class="grid gallery">
<img src="https://i.postimg.cc/Sn3ybhH8/IMG-20251206-154510.jpg" onclick="openImage(this)">
<img src="https://i.postimg.cc/w1Z6Ypn4/IMG-20251206-154512.jpg" onclick="openImage(this)">
</div><h3>Training & Cooking</h3>
<div class="grid gallery">
<img src="https://i.postimg.cc/3kVKQTzq/IMG-20251206-154518.jpg" onclick="openImage(this)">
<img src="https://i.postimg.cc/qhd4gGJL/IMG-20251206-101404.jpg" onclick="openImage(this)">
</div><h3>Cleaning Activities</h3>
<div class="grid gallery">
<img src="https://i.postimg.cc/PpzhD8JV/IMG-20251206-101410.jpg" onclick="openImage(this)">
<img src="https://i.postimg.cc/0MqPrCkr/IMG-20251206-101416.jpg" onclick="openImage(this)">
</div></div><!-- IMAGE MODAL --><div id="imgModal" class="modal" onclick="closeImage()">
<span class="close">×</span>
<img id="modalImg">
</div><a class="floating" onclick="alert('Donate via PayPal or WhatsApp')">💖 Donate</a>

<script>
const names=["Faith Wanjiku","Brian Mwangi","Mercy Achieng","Kevin Otieno","Esther Njeri","Peter Kimani","Lucy Wambui","John Kariuki","Ann Wanjiru","Samuel Ochieng",
"Mary Atieno","David Kiptoo","Grace Chebet","Daniel Mutua","Ruth Wairimu","Joseph Njoroge","Naomi Chebet","Paul Onyango","Rose Atieno","James Mwangi",
"Sarah Akinyi","Michael Otieno","Beatrice Wanjiru","George Kariuki","Hannah Njeri","Isaac Kiprotich","Dorcas Atieno","Elijah Mwangi","Lydia Wambui","Victor Otieno"];

function loadChildren(){
let grid=document.getElementById("childGrid");
grid.innerHTML=names.map(n=>`<div class='card'><h3>${n}</h3><button>Sponsor</button></div>`).join('');
}

function openImage(img){
document.getElementById("imgModal").style.display="flex";
document.getElementById("modalImg").src=img.src;
}

function closeImage(){
document.getElementById("imgModal").style.display="none";
}

loadChildren();
</script></body>
</html>
