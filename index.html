<!DOCTYPE html><html>
<head>
<title>Heart of Passion Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet"><style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb)}

.nav{background:#000;padding:15px;text-align:center}
.nav a{color:white;margin:15px;text-decoration:none;font-weight:bold}

.hero{padding:60px 20px;text-align:center;color:white;background:linear-gradient(135deg,#ff0000,#ff8c00,#1e90ff,#6a11cb)}
.hero img{width:120px;border-radius:10px}
.hero h1{font-size:40px;font-weight:900}

.section{background:white;margin:20px;padding:20px;border-radius:15px;border:3px solid #ddd}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}

.card{background:white;padding:15px;border-radius:12px;border:2px solid #ccc;position:relative}
.card img{width:100%;height:200px;object-fit:cover;border-radius:10px}

.badge{position:absolute;top:10px;left:10px;padding:5px 10px;color:white;border-radius:20px;font-size:12px}
.urgent{background:red}
.supported{background:green}

.progress{background:#eee;height:8px;border-radius:10px;margin-top:10px}
.progress-bar{height:8px;background:green;border-radius:10px}

button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:10px;font-weight:bold}

</style></head><body><div class="nav">
<a href="#home">Home</a>
<a href="#children">Children</a>
<a href="#gallery">Gallery</a>
</div><div id="home" class="hero">
<img src="https://i.imgur.com/8Km9tLL.png">
<h1>HEART OF PASSION FOUNDATION</h1>
<p><b>Bonded in Love ♥️, Humanity, and By God</b></p>
<p>Transforming lives through compassion, education and empowerment.</p>
</div><div id="children" class="section">
<h2>👶 Sponsor a Child</h2>
<div class="grid" id="childGrid"></div>
</div><div id="gallery" class="section">
<h2>📸 Gallery</h2>
<div class="grid">
<img src="https://images.unsplash.com/photo-1509099836639-18ba1795216d" width="100%">
<img src="https://images.unsplash.com/photo-1529390079861-591de354faf5" width="100%">
<img src="https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c" width="100%">
</div>
</div><script>
const children=[
{name:"Faith Wanjiku",img:"https://images.unsplash.com/photo-1502767089025-6572583495b0"},
{name:"Brian Mwangi",img:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1"},
{name:"Mercy Achieng",img:"https://images.unsplash.com/photo-1529626455594-4ff0802cfb7e"},
{name:"Kevin Otieno",img:"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d"}
];

function loadChildren(){
let grid=document.getElementById("childGrid");
grid.innerHTML=children.map((c,i)=>{
let progress=Math.floor(Math.random()*80)+20;
let urgent=i%2===0;
return `
<div class='card'>
<img src='${c.img}'>
<span class='badge ${urgent?"urgent":"supported"}'>${urgent?"URGENT":"SUPPORTED"}</span>
<h3>${c.name}</h3>
<p>Age: ${5+i}</p>
<div class='progress'><div class='progress-bar' style='width:${progress}%'></div></div>
<p>${progress}% funded</p>
<button style='background:#007bff;color:white;'>Sponsor</button>
</div>`}).join('');
}

loadChildren();
</script></body>
</html>
