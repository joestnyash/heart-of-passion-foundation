<!DOCTYPE html><html>
<head>
<title>Heart of Passion Foundation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;700;900&display=swap" rel="stylesheet"><style>
body{margin:0;font-family:Poppins;background:linear-gradient(135deg,#ff9a9e,#fad0c4,#a1c4fd,#c2e9fb)}
.nav{background:#000;padding:15px;text-align:center;position:sticky;top:0}
.nav a{color:#fff;margin:15px;text-decoration:none;font-weight:bold}
.hero{padding:80px 20px;text-align:center;color:#fff;background:linear-gradient(135deg,#ff0000,#ff8c00,#1e90ff,#6a11cb)}
.hero img{width:420px;max-width:95%;margin-bottom:25px;filter:drop-shadow(0 12px 30px rgba(0,0,0,0.7))}
.hero h1{font-size:42px;font-weight:900}
.section{background:#fff;margin:20px;padding:20px;border-radius:15px;border:2px solid #ddd}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px}
.card{background:#fff;padding:15px;border-radius:12px;border:2px solid #ccc}
.badge{padding:5px 10px;border-radius:20px;color:#fff;font-size:12px;display:inline-block}
.urgent{background:red}
.supported{background:green}
.progress{background:#eee;height:8px;border-radius:10px;margin-top:10px}
.progress-bar{height:8px;background:green;border-radius:10px}
button{width:100%;padding:10px;border:none;border-radius:8px;margin-top:10px;font-weight:bold;cursor:pointer}
.floating{position:fixed;bottom:20px;right:20px;background:red;color:#fff;padding:15px;border-radius:50px;text-decoration:none;font-weight:bold}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center}
.modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:320px}
.gallery img{width:100%;border-radius:10px;cursor:pointer;transition:0.3s}
.gallery img:hover{transform:scale(1.05)}
</style></head><body><div class="nav">
<a href="#home">Home</a>
<a href="#children">Children</a>
<a href="#gallery">Gallery</a>
</div><div id="home" class="hero">
<img src="https://i.postimg.cc/7Z95tJtN/file-000000001a8871fdaf1d6e48910c57af.png">
<h1>HEART OF PASSION FOUNDATION</h1>
<p><b>Bonded in Love ♥️, Humanity, and By God</b></p>
</div><div id="children" class="section">
<h2>👶 Sponsor a Child</h2>
<div class="grid" id="childGrid"></div>
</div><div id="gallery" class="section">
<h2>📸 Gallery</h2>
<div class="grid gallery" id="galleryGrid"></div>
</div><a class="floating" onclick="openDonate()">💖 Donate</a>

<div id="donateModal" class="modal">
<div class="modal-content">
<h3>Donate Options</h3>
<button onclick="window.open('https://www.paypal.com/paypalme/joefayeekenya')">PayPal</button>
<button onclick="whatsapp()">MoneyGram</button>
<button onclick="whatsapp()">Western Union</button>
<button onclick="whatsapp()">WorldRemit</button>
<button onclick="closeDonate()">Close</button>
</div>
</div><div id="imgModal" class="modal" onclick="closeImage()">
<img id="modalImg" style="max-width:90%;max-height:90%">
</div><script>

// CHILDREN
const names=[
"Faith Wanjiku","Brian Mwangi","Mercy Achieng","Kevin Otieno","Esther Njeri","Peter Kimani","Lucy Wambui","John Kariuki","Ann Wanjiru","Samuel Ochieng",
"Mary Atieno","David Kiptoo","Grace Chebet","Daniel Mutua","Ruth Wairimu","Joseph Njoroge","Naomi Chebet","Paul Onyango","Rose Atieno","James Mwangi",
"Sarah Akinyi","Michael Otieno","Beatrice Wanjiru","George Kariuki","Hannah Njeri","Isaac Kiprotich","Dorcas Atieno","Elijah Mwangi","Lydia Wambui","Victor Otieno"
];

function loadChildren(){
let grid=document.getElementById("childGrid");
grid.innerHTML=names.map((n,i)=>{
let age=Math.floor(Math.random()*12)+4;
let progress=Math.floor(Math.random()*10);
let urgent=Math.random()<0.75;
return `
<div class='card'>
<span class='badge ${urgent?"urgent":"supported"}'>${urgent?"URGENT":"SUPPORTED"}</span>
<h3>${n}</h3>
<p>Age: ${age}</p>
<div class='progress'><div class='progress-bar' style='width:${progress}%'></div></div>
<p>${progress}% funded</p>
<button onclick='openDonate()'>Sponsor</button>
</div>`}).join('');
}

// GALLERY (ADD YOUR 70+ IMAGES HERE CLEANLY)
const galleryImages=[
"https://i.postimg.cc/MnvWLT3H/FB-IMG-1766220999253.jpg",
"https://i.postimg.cc/JsG1FnY3/FB-IMG-1766221003643.jpg",
"https://i.postimg.cc/Sn3ybhH8/IMG-20251206-154510.jpg",
"https://i.postimg.cc/w1Z6Ypn4/IMG-20251206-154512.jpg",
"https://i.postimg.cc/3kVKQTzq/IMG-20251206-154518.jpg"
];

function loadGallery(){
let grid=document.getElementById("galleryGrid");
grid.innerHTML=galleryImages.map(img=>`<img src='${img}' onclick='openImage(this)'>`).join('');
}

function openImage(img){
document.getElementById("imgModal").style.display="flex";
document.getElementById("modalImg").src=img.src;
}
function closeImage(){document.getElementById("imgModal").style.display="none"}

// DONATE
function openDonate(){document.getElementById('donateModal').style.display='flex'}
function closeDonate(){document.getElementById('donateModal').style.display='none'}
function whatsapp(){window.open('https://wa.me/254725768628')}

loadChildren();
loadGallery();

</script></body>
</html>
